<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Summarizer</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .upload-area {
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent-primary);
            background: rgba(139, 92, 246, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.2);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: inline-block;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .upload-text {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }
        
        .upload-text span {
            color: var(--accent-primary);
            font-weight: 600;
        }

        #fileInput {
            display: none;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-top: 30px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(236, 72, 153, 0.5);
        }
        
        .btn:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            margin-top: 40px;
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-container h2 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .summary-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Custom Scrollbar */
        .summary-box::-webkit-scrollbar { width: 8px; }
        .summary-box::-webkit-scrollbar-track { background: transparent; }
        .summary-box::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        .summary-box::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        .loader {
            display: none;
            text-align: center;
            margin-top: 30px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .selected-file {
            margin-top: 20px;
            font-weight: bold;
            color: var(--accent-primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Document Summarizer</h1>
        <p class="subtitle">Extract core intelligence from massive documents and PDFs instantly.</p>

        <form id="uploadForm">
            <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📄</div>
                <div class="upload-text">Drag & drop your <span>PDF</span> or <span>TXT</span> file here</div>
                <div style="color: var(--text-secondary); font-size: 0.9rem;">or click to browse from device</div>
                <input type="file" id="fileInput" name="file" accept=".txt,.pdf">
            </div>
            
            <div id="fileDisplay" class="selected-file" style="text-align: center;"></div>

            <div style="text-align: center; margin: 20px 0; color: var(--text-secondary);">— OR —</div>

            <textarea id="textInput" placeholder="Paste your raw text here to summarize..." style="width: 100%; height: 120px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px; color: var(--text-primary); font-family: inherit; font-size: 1rem; resize: vertical; box-sizing: border-box;"></textarea>

            <button type="submit" class="btn" id="submitBtn">Generate Summary ✨</button>
        </form>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="color: var(--text-secondary);">Analyzing and synthesizing document... this might take a minute.</p>
        </div>

        <div class="result-container" id="resultContainer">
            <h2>Executive Summary</h2>
            <div class="summary-box" id="summaryOutput"></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileDisplay = document.getElementById('fileDisplay');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const resultContainer = document.getElementById('resultContainer');
        const summaryOutput = document.getElementById('summaryOutput');

        // Drag & Drop handlers
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            if(dt.files && dt.files.length) {
                fileInput.files = dt.files;
                handleFileSelect();
            }
        });

        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect() {
            if (fileInput.files.length > 0) {
                fileDisplay.innerText = "Selected Target: " + fileInput.files[0].name;
            }
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const textValue = document.getElementById('textInput').value.trim();
            
            if (fileInput.files.length === 0 && textValue === '') {
                alert("Please drop a file or paste some text to summarize!");
                return;
            }

            const formData = new FormData();
            if (fileInput.files.length > 0) {
                formData.append("file", fileInput.files[0]);
            } else {
                formData.append("text_input", textValue);
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Synthesizing...";
            loader.style.display = "block";
            resultContainer.style.display = "none";

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const result = await response.json();
                    summaryOutput.innerText = result.summary || result;
                    resultContainer.style.display = "block";
                } else {
                    summaryOutput.innerText = "Error: Failed to generate summary. The file might be too large or invalid.";
                    summaryOutput.style.color = "#ef4444";
                    resultContainer.style.display = "block";
                }
            } catch (error) {
                summaryOutput.innerText = "Network Error Occurred: Are you running the server locally?";
                resultContainer.style.display = "block";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Generate Summary ✨";
                loader.style.display = "none";
            }
        });
    </script>
</body>
</html>
